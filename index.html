<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans p-4 md:p-8 flex justify-center items-center min-h-screen">

  <!-- Bare Trivia Card: NOTHING ELSE -->
  <div class="w-full max-w-lg border border-gray-300 rounded p-6 shadow-sm">
    
    <!-- Question Counter -->
    <div class="flex justify-end text-xs text-gray-500 mb-4">
      <span id="badgeIndex">Question 1 of 96</span>
    </div>

    <!-- Clue Prompt Stem -->
    <div class="mb-6">
      <p id="clueText" class="text-base text-gray-900 leading-relaxed font-normal">
        Loading...
      </p>
    </div>

    <!-- Primary Action: Reveal Answer Button -->
    <div id="revealSection" class="my-4">
      <button onclick="revealAnswer()" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded">
        REVEAL ANSWER
      </button>
    </div>

    <!-- Revealed Solution View -->
    <div id="solutionView" class="hidden mt-6 pt-4 border-t border-gray-200 space-y-4">
      <div>
        <span class="text-xs font-bold uppercase tracking-wider text-gray-500">Answer</span>
        <h3 id="solutionAnswer" class="text-lg font-bold text-gray-900 mt-1">--</h3>
      </div>

      <!-- Multi-Row Feedback Widget -->
      <div class="p-3 bg-gray-50 rounded border border-gray-200 text-left space-y-3">
        <h4 class="text-xs font-bold uppercase tracking-wider text-gray-500">Feedback</h4>

        <!-- Row 1: Quality Reaction -->
        <div>
          <label class="text-xs text-gray-700 block mb-1">1. Was this clue clear & accurate?</label>
          <div class="flex gap-2">
            <button onclick="setQuality('good')" id="btnGood" class="px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300">👍 Good</button>
            <button onclick="setQuality('needs_work')" id="btnNeedsWork" class="px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300">👎 Needs Work</button>
            <button onclick="setQuality('flag_issue')" id="btnFlag" class="px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300">🚩 Flag Issue</button>
          </div>
        </div>

        <!-- Row 2: 1-5 Difficulty Scale -->
        <div>
          <label class="text-xs text-gray-700 block mb-1">2. How difficult was this clue? (1 = Easy, 5 = Hard)</label>
          <div class="flex items-center gap-1.5">
            <button onclick="setDifficulty(1)" class="diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white">1</button>
            <button onclick="setDifficulty(2)" class="diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white">2</button>
            <button onclick="setDifficulty(3)" class="diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white">3</button>
            <button onclick="setDifficulty(4)" class="diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white">4</button>
            <button onclick="setDifficulty(5)" class="diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white">5</button>
          </div>
        </div>

        <!-- Row 3: Optional Text Comment -->
        <div>
          <input type="text" id="feedbackComment" onchange="saveComment()" placeholder="Optional feedback..." class="w-full text-xs p-1.5 bg-white border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>

        <div id="feedbackSubmittedMsg" class="hidden text-xs text-green-700 font-medium">Saved.</div>
      </div>
    </div>

    <!-- Navigation Controls -->
    <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-100">
      <button onclick="prevQuestion()" class="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white border border-gray-300 rounded hover:bg-gray-50">
        Previous
      </button>

      <button onclick="nextQuestion()" class="px-4 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded">
        Next Question
      </button>
    </div>

  </div>

  <!-- Application Logic -->
  <script>
    let allQuestions = [];
    let currentIndex = 0;
    let isRevealed = false;

    const LS_FEEDBACK = 'bp_som_feedback';

    function getFeedbackStore() {
      return JSON.parse(localStorage.getItem(LS_FEEDBACK) || '{}');
    }

    async function init() {
      try {
        const res = await fetch('data/questions.json?v=' + Date.now());
        allQuestions = await res.json();
        
        // Randomize questions deck order
        shuffleArray(allQuestions);

        renderQuestion();
      } catch (err) {
        console.error(err);
        document.getElementById('clueText').innerText = "Error loading questions.";
      }
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function renderQuestion() {
      if (allQuestions.length === 0) return;

      const q = allQuestions[currentIndex];
      isRevealed = false;

      document.getElementById('badgeIndex').innerText = `Question ${currentIndex + 1} of ${allQuestions.length}`;
      document.getElementById('clueText').innerText = q.clue;

      document.getElementById('revealSection').classList.remove('hidden');
      document.getElementById('solutionView').classList.add('hidden');
      document.getElementById('feedbackSubmittedMsg').classList.add('hidden');

      loadSavedFeedback(q.id);
    }

    function revealAnswer() {
      if (allQuestions.length === 0) return;
      const q = allQuestions[currentIndex];
      isRevealed = true;

      document.getElementById('solutionAnswer').innerText = q.answer;

      document.getElementById('revealSection').classList.add('hidden');
      document.getElementById('solutionView').classList.remove('hidden');
    }

    function nextQuestion() {
      if (allQuestions.length === 0) return;
      currentIndex = (currentIndex + 1) % allQuestions.length;
      renderQuestion();
    }

    function prevQuestion() {
      if (allQuestions.length === 0) return;
      currentIndex = (currentIndex - 1 + allQuestions.length) % allQuestions.length;
      renderQuestion();
    }

    function saveFeedbackData(updates) {
      if (allQuestions.length === 0) return;
      const q = allQuestions[currentIndex];
      const store = getFeedbackStore();
      store[q.id] = { ...(store[q.id] || {}), ...updates, timestamp: new Date().toISOString() };
      localStorage.setItem(LS_FEEDBACK, JSON.stringify(store));
      document.getElementById('feedbackSubmittedMsg').classList.remove('hidden');
    }

    function setQuality(val) {
      saveFeedbackData({ quality: val });
      updateQualityUI(val);
    }

    function setDifficulty(level) {
      saveFeedbackData({ difficulty: level });
      updateDifficultyUI(level);
    }

    function saveComment() {
      const text = document.getElementById('feedbackComment').value;
      if (text.trim()) {
        saveFeedbackData({ comment: text.trim() });
      }
    }

    function updateQualityUI(val) {
      document.getElementById('btnGood').className = val === 'good' ? 'px-2.5 py-1 text-xs font-medium rounded border bg-green-100 border-green-400 text-green-900' : 'px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300';
      document.getElementById('btnNeedsWork').className = val === 'needs_work' ? 'px-2.5 py-1 text-xs font-medium rounded border bg-yellow-100 border-yellow-400 text-yellow-900' : 'px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300';
      document.getElementById('btnFlag').className = val === 'flag_issue' ? 'px-2.5 py-1 text-xs font-medium rounded border bg-red-100 border-red-400 text-red-900' : 'px-2.5 py-1 text-xs font-medium rounded border bg-white border-gray-300';
    }

    function updateDifficultyUI(level) {
      const btns = document.querySelectorAll('.diff-btn');
      btns.forEach((btn, idx) => {
        if (idx + 1 === level) {
          btn.className = 'diff-btn w-7 h-7 text-xs font-bold rounded border border-blue-600 bg-blue-600 text-white';
        } else {
          btn.className = 'diff-btn w-7 h-7 text-xs font-bold rounded border border-gray-300 bg-white text-gray-700';
        }
      });
    }

    function loadSavedFeedback(qId) {
      const store = getFeedbackStore();
      const data = store[qId];
      if (data) {
        updateQualityUI(data.quality || null);
        updateDifficultyUI(data.difficulty || null);
        document.getElementById('feedbackComment').value = data.comment || '';
      } else {
        updateQualityUI(null);
        updateDifficultyUI(null);
        document.getElementById('feedbackComment').value = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        if (!isRevealed) revealAnswer();
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        nextQuestion();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        prevQuestion();
      }
    });

    init();
  </script>
</body>
</html>
