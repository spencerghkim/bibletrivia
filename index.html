<!DOCTYPE html>
<html lang="en" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trivia</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
    }
  </style>
</head>
<body class="bg-white text-gray-900 font-sans h-full max-h-dvh flex flex-col justify-center items-center p-3 sm:p-4 overflow-hidden">

  <!-- Viewport-Locked Card Container -->
  <div class="w-full max-w-md border border-gray-300 rounded-xl p-4 sm:p-5 shadow-sm flex flex-col justify-between max-h-full overflow-hidden">
    
    <!-- Question Counter -->
    <div class="flex justify-end text-xs font-medium text-gray-400 mb-1">
      <span id="badgeIndex">Question 1 of 96</span>
    </div>

    <!-- Clue Prompt Stem Container -->
    <div class="flex-1 flex items-center justify-center my-1 overflow-hidden min-h-[70px]">
      <p id="clueText" class="text-base sm:text-lg text-gray-900 leading-snug font-normal text-center">
        Loading...
      </p>
    </div>

    <!-- Primary Action: Reveal Answer Button -->
    <div id="revealSection" class="my-2">
      <button onclick="revealAnswer()" class="w-full py-2.5 bg-blue-600 active:bg-blue-700 text-white font-medium text-sm rounded-lg transition">
        REVEAL ANSWER
      </button>
    </div>

    <!-- Revealed Solution View -->
    <div id="solutionView" class="hidden my-2 pt-2 border-t border-gray-200 space-y-2">
      <div class="text-center">
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Answer</span>
        <h3 id="solutionAnswer" class="text-base sm:text-lg font-bold text-gray-900 mt-0.5">--</h3>
      </div>

      <!-- Multi-Row Feedback Widget -->
      <div class="p-2.5 bg-gray-50 rounded-lg border border-gray-200 text-left space-y-2">
        <h4 class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Feedback</h4>

        <!-- Row 1: Quality Reaction -->
        <div>
          <label class="text-[11px] text-gray-600 block mb-1">1. Was this clue clear & accurate?</label>
          <div class="flex gap-1.5">
            <button onclick="selectQuality('good')" id="btnGood" class="flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300">👍 Good</button>
            <button onclick="selectQuality('needs_work')" id="btnNeedsWork" class="flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300">👎 Work</button>
            <button onclick="selectQuality('flag_issue')" id="btnFlag" class="flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300">🚩 Flag</button>
          </div>
        </div>

        <!-- Row 2: 1-5 Difficulty Scale -->
        <div>
          <label class="text-[11px] text-gray-600 block mb-1">2. How difficult was this clue?</label>
          <div class="flex justify-between items-center gap-1">
            <button onclick="selectDifficulty(1)" class="diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white">1</button>
            <button onclick="selectDifficulty(2)" class="diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white">2</button>
            <button onclick="selectDifficulty(3)" class="diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white">3</button>
            <button onclick="selectDifficulty(4)" class="diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white">4</button>
            <button onclick="selectDifficulty(5)" class="diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white">5</button>
          </div>
        </div>

        <!-- Row 3: Optional Text Comment -->
        <div>
          <input type="text" id="feedbackComment" placeholder="Optional feedback..." class="w-full text-xs p-1.5 bg-white border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
        </div>

        <!-- Explicit Submit Button & Confirmation -->
        <div class="flex justify-between items-center pt-1">
          <div id="feedbackSubmittedMsg" class="hidden text-[11px] text-green-700 font-medium">✓ Feedback Submitted!</div>
          <button onclick="submitFeedback()" class="ml-auto px-4 py-1.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-xs font-medium rounded-md transition shadow-sm">
            Submit
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation Controls -->
    <div class="flex justify-between items-center pt-2 border-t border-gray-100 mt-1">
      <button onclick="prevQuestion()" class="px-3 py-1.5 text-xs font-medium text-gray-700 bg-white border border-gray-300 rounded-lg active:bg-gray-100">
        Previous
      </button>

      <button onclick="nextQuestion()" class="px-4 py-1.5 text-xs font-medium text-white bg-blue-600 active:bg-blue-700 rounded-lg">
        Next Question
      </button>
    </div>

  </div>

  <!-- Application Logic -->
  <script>
    let allQuestions = [];
    let currentIndex = 0;
    let isRevealed = false;

    let currentQuality = null;
    let currentDifficulty = null;

    const LS_FEEDBACK = 'bp_som_feedback';
    const GOOGLE_SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxl8utOCtbfqyq9nnWuQ7GcSLsyGJSTGqtsHXzzIRPZucAHBZygJLjeQrjvUXUUq8c9Dw/exec';

    function getFeedbackStore() {
      return JSON.parse(localStorage.getItem(LS_FEEDBACK) || '{}');
    }

    async function init() {
      try {
        const res = await fetch('data/questions.json?v=' + Date.now());
        allQuestions = await res.json();
        
        // Randomize questions deck order
        shuffleArray(allQuestions);

        renderQuestion();
      } catch (err) {
        console.error(err);
        document.getElementById('clueText').innerText = "Error loading questions.";
      }
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function renderQuestion() {
      if (allQuestions.length === 0) return;

      const q = allQuestions[currentIndex];
      isRevealed = false;
      currentQuality = null;
      currentDifficulty = null;

      document.getElementById('badgeIndex').innerText = `Question ${currentIndex + 1} of ${allQuestions.length}`;
      document.getElementById('clueText').innerText = q.clue;

      document.getElementById('revealSection').classList.remove('hidden');
      document.getElementById('solutionView').classList.add('hidden');
      document.getElementById('feedbackSubmittedMsg').classList.add('hidden');

      loadSavedFeedback(q.id);
    }

    function revealAnswer() {
      if (allQuestions.length === 0) return;
      const q = allQuestions[currentIndex];
      isRevealed = true;

      document.getElementById('solutionAnswer').innerText = q.answer;

      document.getElementById('revealSection').classList.add('hidden');
      document.getElementById('solutionView').classList.remove('hidden');
    }

    function nextQuestion() {
      if (allQuestions.length === 0) return;
      currentIndex = (currentIndex + 1) % allQuestions.length;
      renderQuestion();
    }

    function prevQuestion() {
      if (allQuestions.length === 0) return;
      currentIndex = (currentIndex - 1 + allQuestions.length) % allQuestions.length;
      renderQuestion();
    }

    function selectQuality(val) {
      currentQuality = val;
      updateQualityUI(val);
    }

    function selectDifficulty(level) {
      currentDifficulty = level;
      updateDifficultyUI(level);
    }

    function submitFeedback() {
      if (allQuestions.length === 0) return;
      const q = allQuestions[currentIndex];
      const commentText = document.getElementById('feedbackComment').value.trim();

      const payload = {
        questionId: q.id,
        quality: currentQuality || '',
        difficulty: currentDifficulty || '',
        comment: commentText,
        timestamp: new Date().toISOString()
      };

      // 1. Save to LocalStorage
      const store = getFeedbackStore();
      store[q.id] = payload;
      localStorage.setItem(LS_FEEDBACK, JSON.stringify(store));

      // 2. Post to Google Sheet via URLSearchParams (CORS-friendly for Google Apps Script)
      try {
        const params = new URLSearchParams();
        params.append('questionId', q.id);
        params.append('quality', currentQuality || 'N/A');
        params.append('difficulty', currentDifficulty || 'N/A');
        params.append('comment', commentText);

        fetch(GOOGLE_SHEET_ENDPOINT, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
      } catch (e) {
        console.warn("Google Sheet submission error:", e);
      }

      document.getElementById('feedbackSubmittedMsg').classList.remove('hidden');
    }

    function updateQualityUI(val) {
      document.getElementById('btnGood').className = val === 'good' ? 'flex-1 py-1 text-xs font-medium rounded border bg-green-100 border-green-400 text-green-900' : 'flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300';
      document.getElementById('btnNeedsWork').className = val === 'needs_work' ? 'flex-1 py-1 text-xs font-medium rounded border bg-yellow-100 border-yellow-400 text-yellow-900' : 'flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300';
      document.getElementById('btnFlag').className = val === 'flag_issue' ? 'flex-1 py-1 text-xs font-medium rounded border bg-red-100 border-red-400 text-red-900' : 'flex-1 py-1 text-xs font-medium rounded border bg-white border-gray-300';
    }

    function updateDifficultyUI(level) {
      const btns = document.querySelectorAll('.diff-btn');
      btns.forEach((btn, idx) => {
        if (idx + 1 === level) {
          btn.className = 'diff-btn flex-1 h-7 text-xs font-bold rounded border border-blue-600 bg-blue-600 text-white';
        } else {
          btn.className = 'diff-btn flex-1 h-7 text-xs font-bold rounded border border-gray-300 bg-white text-gray-700';
        }
      });
    }

    function loadSavedFeedback(qId) {
      const store = getFeedbackStore();
      const data = store[qId];
      if (data) {
        currentQuality = data.quality || null;
        currentDifficulty = data.difficulty || null;
        updateQualityUI(currentQuality);
        updateDifficultyUI(currentDifficulty);
        document.getElementById('feedbackComment').value = data.comment || '';
      } else {
        updateQualityUI(null);
        updateDifficultyUI(null);
        document.getElementById('feedbackComment').value = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        if (!isRevealed) revealAnswer();
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        nextQuestion();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        prevQuestion();
      }
    });

    init();
  </script>
</body>
</html>
